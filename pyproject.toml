[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    ".venv",
    "WildBridgeApp",
    "tmp",
    "GroundStation/video_test/logs",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "N", "C4", "SIM", "C90", "RUF"]
ignore = [
    "E501",
    "B008",
    "SIM108",
    "N812",
    "N806",
    "UP007",
    "UP017",
    "UP042",
    "RUF001",
    "RUF002",
    "RUF003",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"GroundStation/ROS/**/test/**" = ["B", "N", "E402"]
"GroundStation/ROS/**/launch/**" = ["E402"]
"GroundStation/Python/wildbridge_groundstation/dji_client.py" = ["N802", "N803"]
"GroundStation/Python/mavlink_proxy.py" = ["E402"]
"GroundStation/ROS/dji_controller/dji_controller/submodules/dji_interface.py" = ["N802", "N803"]
"GroundStation/ROS/wildbridge_mavros/wildbridge_mavros/dji_interface.py" = ["N802", "N803"]
"GroundStation/ROS/wildbridge_mavros/wildbridge_mavros/auto_launch.py" = ["E402"]
"GroundStation/ROS/wildbridge_mavros/wildbridge_mavros/mavros_bridge.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
pythonpath = ["GroundStation/Python", "GroundStation/video_test/webapp"]
testpaths = ["GroundStation/tests"]

[tool.mypy]
python_version = "3.10"
explicit_package_bases = true
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = false
warn_redundant_casts = false
warn_unused_ignores = false
warn_no_return = false
check_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_defs = false
disallow_untyped_calls = false
no_implicit_optional = false
exclude = [
    ".venv",
    "WildBridgeApp",
    "tmp",
    "GroundStation/video_test/logs",
]
files = [
    "GroundStation/Python/wildbridge_groundstation",
    "GroundStation/Python/wildbridge_dji_helpers.py",
]

[tool.bandit]
exclude_dirs = [
    ".venv",
    "WildBridgeApp",
    "tmp",
    "GroundStation/video_test/logs",
]
skips = ["B101"]
severity = "MEDIUM"